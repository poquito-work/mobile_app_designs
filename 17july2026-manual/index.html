<style>
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; min-height:100%; font-family:'Hero';
    background:radial-gradient(120% 90% at 50% 0%, #EFE8DA 0%, #E4DCCB 60%, #DAD1BE 100%); }
  ::selection{ background:rgba(182,90,47,0.25); }
  .stage{ min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:26px; padding:40px 20px; }

  @keyframes pqIn{ from{ transform:translateY(9px); } to{ transform:none; } }
  @keyframes pqOut{ from{ transform:none; } to{ transform:translateY(-5px); } }
  @keyframes pqDeviceIn{ from{ transform:translateY(14px) scale(.99); } to{ transform:none; } }
  @keyframes pqFade{ from{ transform:translateY(6px); } to{ transform:none; } }
  @keyframes pqRise{ from{ transform:translateY(10px); } to{ transform:none; } }
  @keyframes pqSlideDown{ 0%{ transform:translateY(-16px); } 70%{ transform:translateY(2px); } 100%{ transform:translateY(0); } }
  @keyframes pqTrayIn{ from{ transform:translateY(8px); } to{ transform:none; } }
  @keyframes pqSheetUp{ from{ transform:translateY(46px); } to{ transform:none; } }
  @keyframes pqPopIn{ from{ transform:scale(.9) translateY(10px); } to{ transform:none; } }
  @keyframes pqReveal{ from{ opacity:0; transform:translateY(12px) scale(.96); } to{ opacity:1; transform:none; } }
  .pq-reveal{ animation:pqReveal .5s cubic-bezier(.2,.8,.25,1) both; }
  .device{ animation:pqDeviceIn .5s cubic-bezier(.2,.7,.2,1) both; }
  .pq-tabview{ animation:pqFade .28s ease both; }
  .pq-rise{ animation:pqRise .42s cubic-bezier(.2,.7,.2,1) both; }
  .pq-banner{ animation:pqSlideDown .46s cubic-bezier(.22,.8,.3,1) both; }
  .pq-tray-in{ animation:pqTrayIn .2s ease both; }
  .pq-sheet-up{ animation:pqSheetUp .34s cubic-bezier(.22,.8,.3,1) both; }
  .pq-pop-in{ animation:pqPopIn .34s cubic-bezier(.2,.8,.25,1) both; }

  @keyframes pqPulse{ 0%{ box-shadow:0 0 0 0 rgba(182,90,47,0.45); } 70%{ box-shadow:0 0 0 7px rgba(182,90,47,0); } 100%{ box-shadow:0 0 0 0 rgba(182,90,47,0); } }
  @keyframes pqCaretBlink{ 0%,100%{ opacity:1; } 50%{ opacity:0; } }
  @keyframes pqToastIn{ from{ opacity:0; transform:translate(-50%,8px); } to{ opacity:1; transform:translate(-50%,0); } }
  @keyframes pqGold{ 0%{ box-shadow:0 0 0 0 rgba(201,151,47,0.55), 0 6px 18px -6px rgba(201,151,47,0.5); } 70%{ box-shadow:0 0 0 12px rgba(201,151,47,0), 0 6px 18px -6px rgba(201,151,47,0.5); } 100%{ box-shadow:0 0 0 0 rgba(201,151,47,0), 0 6px 18px -6px rgba(201,151,47,0.5); } }
  @keyframes pqTimerPulse{ 0%,100%{ opacity:1; } 50%{ opacity:.45; } }
  .pq-pulse{ animation:pqPulse 1.8s ease-out infinite; }
  .pq-caret{ animation:pqCaretBlink 1s step-end infinite; }
  .pq-toast{ animation:pqToastIn .26s ease both; }
  .pq-toast2{ animation:pqFade .3s ease both; }
  .pq-mahjong-glow{ animation:pqGold 1.7s ease-out infinite; }
  .pq-timer-pulse{ animation:pqTimerPulse 1s ease-in-out infinite; }

  .pq-press{ transition:transform .12s ease, filter .12s ease; -webkit-tap-highlight-color:transparent; }
  .pq-press:active{ transform:scale(.97); filter:brightness(.98); }
  .pq-scroll{ scrollbar-width:none; -webkit-overflow-scrolling:touch; }
  .pq-scroll::-webkit-scrollbar{ width:0; height:0; }

  .ctrl{ display:flex; align-items:center; gap:14px; padding:12px 18px; border-radius:999px; background:#F9F2E4; border:1.5px solid #E3D6BB; user-select:none; }
  .ctrl .lbl{ font-size:12px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:#37342B; }
  .ctrl .hint{ font-size:11px; color:#9A9385; letter-spacing:.04em; }
</style>
